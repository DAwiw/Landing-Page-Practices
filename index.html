<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Landing Page</title>
    <style>
        /* 1. ตั้งค่าพื้นฐาน */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
		background-color: #ffe6e6;
		color: #333; 
		line-height: 1.6; 
	     }

        /* 2. ส่วนหัว (Header) */
        header { background: #2c3e50; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }

        /* 5. Dropdown Menu */
        .dropdown { position: relative; display: inline-block; margin-left: 20px; }
        .dropdown-btn { 
            background-color: #34495e; 
            color: white; 
            padding: 12px 16px; 
            font-size: 16px; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px;
            transition: 0.3s;
        }
        .dropdown-btn:hover { background-color: #2c3e50; }
        .dropdown-content { 
            display: none; 
            position: absolute; 
            right: 0; 
            background-color: #34495e; 
            min-width: 200px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); 
            z-index: 1;
            border-radius: 4px;
            top: 100%;
            margin-top: 5px;
        }
        .dropdown-content a { 
            color: white; 
            padding: 12px 16px; 
            text-decoration: none; 
            display: block; 
            transition: 0.3s;
            margin-left: 0;
        }
        .dropdown-content a:hover { background-color: #2c3e50; }
        .dropdown.active .dropdown-content { display: block; }

        /* 3. ส่วนเนื้อหาหลัก (Hero Section) */
        .hero { max-width: 800px; margin: 80px auto; text-align: center; padding: 20px; }
        .hero h1 { 
		font-size: 48px;
		color: #9b59b6; /* เปลี่ยนจากสีน้ำเงินเข้มเดิม เป็นสีม่วง */ 
		margin-bottom: 20px; }
        .hero p { font-size: 18px; color: #7f8c8d; margin-bottom: 30px; }
        
        /* 4. ปุ่ม Call to Action */
        .btn { display: inline-block; background: #e74c3c; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #c0392b; transform: scale(1.05); }
    </style>
</head>
<body>
    <header>
        <div class="logo">🚀 MyBrand</div>
        <nav>
            <a href="#">หน้าแรก</a>
            <a href="#">บริการ</a>
            <div class="dropdown">
                <button class="dropdown-btn" onclick="toggleDropdown()">เพิ่มเติม ▼</button>
                <div class="dropdown-content">
                    <a href="#">ติดต่อเรา</a>
                    <a href="#">เกี่ยวกับเรา</a>
                    <a href="#">นโยบายความเป็นส่วนตัว</a>
                    <a href="#">เงื่อนไขการใช้งาน</a>
                </div>
            </div>
        </nav>
    </header>

    <section class="hero">
        <h1>ยินดีต้อนรับสู่ร้านค้าออนไลน์ของฉัน</h1>
	<img src="profile.JPG"
	     alt="รูปภาพประกอบเว็บ"
	     style="width: 100%;
             max-width: 400px;
             display: block;
             margin: 20px auto;
             border-radius: 8px;"
        >
        <p>นี่คือหน้า Landing Page ที่สร้างขึ้นเองจากศูนย์ด้วย 
		<span style="color: red; 
		             background-color: yellow; 
		             padding: 2px 6px;
			     border-radius: 3px;"
		>HTML และ CSS
		</span> 
	        เพื่อฝึกฝนการใช้งาน GitHub Pages เว็บนี้โหลดเร็ว ปลอดภัย และแสดงผลได้ดีบนมือถือ
        </p>
        <a href="https://github.com" target="_blank" class="btn">เริ่มต้นใช้งานฟรี</a>
    </section>

    <script>
        function toggleDropdown() {
            const dropdown = document.querySelector('.dropdown');
            dropdown.classList.toggle('active');
        }

        // ปิด dropdown เมื่อคลิกที่ไหนนอกเนื้อที่
        document.addEventListener('click', function(event) {
            const dropdown = document.querySelector('.dropdown');
            const dropdownBtn = document.querySelector('.dropdown-btn');
            
            if (!dropdown.contains(event.target)) {
                dropdown.classList.remove('active');
            }
        });
    </script>

</body>
</html>
