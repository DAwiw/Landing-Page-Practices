<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Landing Page</title>
    <style>
        /* 1. ตั้งค่าพื้นฐาน */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; line-height: 1.6; }

        /* 2. ส่วนหัว (Header) */
        header { background: #2c3e50; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        nav a { color: white; text-decoration: none; margin-left: 20px; }

        /* 3. ส่วนเนื้อหาหลัก (Hero Section) */
        .hero { max-width: 800px; margin: 80px auto; text-align: center; padding: 20px; }
        .hero h1 { font-size: 48px; color: #2c3e50; margin-bottom: 20px; }
        .hero p { font-size: 18px; color: #7f8c8d; margin-bottom: 30px; }
        
        /* 4. ปุ่ม Call to Action */
        .btn { display: inline-block; background: #e74c3c; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #c0392b; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 MyBrand</div>
        <nav><a href="#">หน้าแรก</a><a href="#">บริการ</a></nav>
    </header>

    <section class="hero">
        <h1>ยินดีต้อนรับสู่เว็บไซต์แรกของฉัน</h1>
        <p>นี่คือหน้า Landing Page ที่สร้างขึ้นเองจากศูนย์ด้วย HTML และ CSS เพื่อฝึกฝนการใช้งาน GitHub Pages เว็บนี้โหลดเร็ว ปลอดภัย และแสดงผลได้ดีบนมือถือ</p>
        <a href="https://github.com" target="_blank" class="btn">เริ่มต้นใช้งานฟรี</a>
    </section>

</body>
</html>
